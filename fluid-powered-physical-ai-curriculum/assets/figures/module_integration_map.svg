<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img" font-family="sans-serif">
<title>Module integration map — dependency and artifact flows</title>
<desc>Three rows of module nodes showing sequential and cross-row dependencies. Chains: physics to digital twin, hardware to control, sensing to validation. All modules converge on the capstone.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .arr { stroke: #73726c; stroke-width: 1.5px; fill: none; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }
    rect { stroke-width: 0.5px; }
    .c-amber  rect { fill: #FAEEDA; stroke: #BA7517; } .c-amber  .th,.c-amber  .t { fill: #633806; } .c-amber  .ts { fill: #854F0B; }
    .c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  .th,.c-coral  .t { fill: #712B13; } .c-coral  .ts { fill: #993C1D; }
    .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   .th,.c-teal   .t { fill: #085041; } .c-teal   .ts { fill: #0F6E56; }
    .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue   .th,.c-blue   .t { fill: #0C447C; } .c-blue   .ts { fill: #185FA5; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th,.c-purple .t { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
    .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray   .th,.c-gray   .t { fill: #444441; } .c-gray   .ts { fill: #5F5E5A; }
    .dim { opacity: 0.45; }
    @media (prefers-color-scheme: dark) {
      .t { fill: #E8E6DE; } .ts { fill: #B4B2A9; } .th { fill: #F1EFE8; }
      .arr { stroke: #9c9a92; } .leader { stroke: #5F5E5A; }
      .c-amber  rect { fill: #412402; stroke: #EF9F27; } .c-amber  .th,.c-amber  .t { fill: #FAC775; } .c-amber  .ts { fill: #EF9F27; }
      .c-coral  rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral  .th,.c-coral  .t { fill: #F5C4B3; } .c-coral  .ts { fill: #F0997B; }
      .c-teal   rect { fill: #04342C; stroke: #5DCAA5; } .c-teal   .th,.c-teal   .t { fill: #9FE1CB; } .c-teal   .ts { fill: #5DCAA5; }
      .c-blue   rect { fill: #042C53; stroke: #85B7EB; } .c-blue   .th,.c-blue   .t { fill: #B5D4F4; } .c-blue   .ts { fill: #85B7EB; }
      .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple .th,.c-purple .t { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
      .c-gray   rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray   .th,.c-gray   .t { fill: #D3D1C7; } .c-gray   .ts { fill: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
<text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">Module integration map</text>
<text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">How knowledge and artifacts flow between modules toward the capstone</text>

<g class="c-gray"><rect x="56" y="62" width="130" height="60" rx="6"/>
  <text class="th" x="121" y="86" text-anchor="middle" dominant-baseline="central">M01</text>
  <text class="ts" x="121" y="108" text-anchor="middle" dominant-baseline="central">Foundations</text></g>
<g class="c-gray"><rect x="202" y="62" width="130" height="60" rx="6"/>
  <text class="th" x="267" y="86" text-anchor="middle" dominant-baseline="central">M02</text>
  <text class="ts" x="267" y="108" text-anchor="middle" dominant-baseline="central">Components</text></g>
<g class="c-gray"><rect x="348" y="62" width="130" height="60" rx="6"/>
  <text class="th" x="413" y="86" text-anchor="middle" dominant-baseline="central">M03</text>
  <text class="ts" x="413" y="108" text-anchor="middle" dominant-baseline="central">Fluids</text></g>
<g class="c-gray"><rect x="494" y="62" width="130" height="60" rx="6"/>
  <text class="th" x="559" y="86" text-anchor="middle" dominant-baseline="central">M04</text>
  <text class="ts" x="559" y="108" text-anchor="middle" dominant-baseline="central">Fluid mechanics</text></g>
<line x1="186" y1="92" x2="200" y2="92" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
<line x1="332" y1="92" x2="346" y2="92" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
<line x1="478" y1="92" x2="492" y2="92" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>

<g class="c-amber"><rect x="56" y="158" width="130" height="60" rx="6"/>
  <text class="th" x="121" y="182" text-anchor="middle" dominant-baseline="central">M05</text>
  <text class="ts" x="121" y="204" text-anchor="middle" dominant-baseline="central">Pumps</text></g>
<g class="c-amber"><rect x="202" y="158" width="130" height="60" rx="6"/>
  <text class="th" x="267" y="182" text-anchor="middle" dominant-baseline="central">M06</text>
  <text class="ts" x="267" y="204" text-anchor="middle" dominant-baseline="central">Valves</text></g>
<g class="c-amber"><rect x="348" y="158" width="130" height="60" rx="6"/>
  <text class="th" x="413" y="182" text-anchor="middle" dominant-baseline="central">M07</text>
  <text class="ts" x="413" y="204" text-anchor="middle" dominant-baseline="central">Cylinders</text></g>
<g class="c-amber"><rect x="494" y="158" width="130" height="60" rx="6"/>
  <text class="th" x="559" y="182" text-anchor="middle" dominant-baseline="central">M08</text>
  <text class="ts" x="559" y="204" text-anchor="middle" dominant-baseline="central">Circuit design</text></g>
<line x1="186" y1="188" x2="200" y2="188" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<line x1="332" y1="188" x2="346" y2="188" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<line x1="478" y1="188" x2="492" y2="188" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>

<g class="c-teal"><rect x="129" y="254" width="130" height="60" rx="6"/>
  <text class="th" x="194" y="278" text-anchor="middle" dominant-baseline="central">M09</text>
  <text class="ts" x="194" y="300" text-anchor="middle" dominant-baseline="central">Sensors</text></g>
<g class="c-teal"><rect x="275" y="254" width="130" height="60" rx="6"/>
  <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">M10</text>
  <text class="ts" x="340" y="300" text-anchor="middle" dominant-baseline="central">Embedded control</text></g>
<g class="c-purple"><rect x="421" y="254" width="130" height="60" rx="6"/>
  <text class="th" x="486" y="278" text-anchor="middle" dominant-baseline="central">M11</text>
  <text class="ts" x="486" y="300" text-anchor="middle" dominant-baseline="central">Digital twin</text></g>
<line x1="259" y1="284" x2="273" y2="284" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>
<line x1="405" y1="284" x2="419" y2="284" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>

<line x1="559" y1="122" x2="559" y2="156" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A" stroke-dasharray="4 2" opacity="0.7"/>
<text class="ts dim" x="616" y="140" text-anchor="middle" dominant-baseline="central">ODE model</text>
<line x1="267" y1="122" x2="267" y2="156" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A" stroke-dasharray="4 2" opacity="0.7"/>
<text class="ts dim" x="44" y="140" text-anchor="middle" dominant-baseline="central">Valve cmd</text>
<path d="M559 218 L559 232 L486 232 L486 252" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 2" opacity="0.7" marker-end="url(#arrow)"/>
<path d="M267 218 L267 238 L340 238 L340 252" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 2" opacity="0.7" marker-end="url(#arrow)"/>
<path d="M194 314 L194 332 L486 332 L486 316" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 2" opacity="0.7" marker-end="url(#arrow)"/>
<text class="ts dim" x="523" y="228" text-anchor="middle" dominant-baseline="central">integrated sim</text>
<text class="ts dim" x="304" y="244" text-anchor="middle" dominant-baseline="central">valve code</text>
<text class="ts dim" x="340" y="342" text-anchor="middle" dominant-baseline="central">sensor data log</text>

<g class="c-coral"><rect x="56" y="370" width="568" height="60" rx="8"/>
  <text class="th" x="340" y="394" text-anchor="middle" dominant-baseline="central">M12 · Smart Agricultural Workcell capstone</text>
  <text class="ts" x="340" y="416" text-anchor="middle" dominant-baseline="central">All twelve modules converge — full system integration, demonstration, and validation</text></g>
<line x1="194" y1="314" x2="194" y2="368" class="arr" marker-end="url(#arrow)" stroke="#993C1D" opacity="0.4"/>
<line x1="340" y1="314" x2="340" y2="368" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>
<line x1="486" y1="314" x2="486" y2="368" class="arr" marker-end="url(#arrow)" stroke="#993C1D" opacity="0.4"/>

<line x1="56" y1="450" x2="86" y2="450" stroke="#9c9a92" stroke-width="0.8" stroke-dasharray="4 2"/>
<text class="ts" x="92" y="450" dominant-baseline="central">Artifact / knowledge flow</text>
<line x1="280" y1="450" x2="310" y2="450" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="316" y="450" dominant-baseline="central">Sequential dependency</text>
</svg>
