<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 440" role="img" font-family="sans-serif">
<title>Intelligence pipeline — Sense to Validate</title>
<desc>Six-stage pipeline showing how the Smart Agricultural Workcell perceives, decides, and acts: Sense, Understand, Decide, Command, Actuate, Validate, with components and module numbers per stage.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .arr { stroke: #73726c; stroke-width: 1.5px; fill: none; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }
    rect { stroke-width: 0.5px; }
    .c-amber  rect { fill: #FAEEDA; stroke: #BA7517; } .c-amber  .th,.c-amber  .t { fill: #633806; } .c-amber  .ts { fill: #854F0B; }
    .c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  .th,.c-coral  .t { fill: #712B13; } .c-coral  .ts { fill: #993C1D; }
    .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   .th,.c-teal   .t { fill: #085041; } .c-teal   .ts { fill: #0F6E56; }
    .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue   .th,.c-blue   .t { fill: #0C447C; } .c-blue   .ts { fill: #185FA5; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th,.c-purple .t { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
    .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray   .th,.c-gray   .t { fill: #444441; } .c-gray   .ts { fill: #5F5E5A; }
    .dim { opacity: 0.45; }
    @media (prefers-color-scheme: dark) {
      .t { fill: #E8E6DE; } .ts { fill: #B4B2A9; } .th { fill: #F1EFE8; }
      .arr { stroke: #9c9a92; } .leader { stroke: #5F5E5A; }
      .c-amber  rect { fill: #412402; stroke: #EF9F27; } .c-amber  .th,.c-amber  .t { fill: #FAC775; } .c-amber  .ts { fill: #EF9F27; }
      .c-coral  rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral  .th,.c-coral  .t { fill: #F5C4B3; } .c-coral  .ts { fill: #F0997B; }
      .c-teal   rect { fill: #04342C; stroke: #5DCAA5; } .c-teal   .th,.c-teal   .t { fill: #9FE1CB; } .c-teal   .ts { fill: #5DCAA5; }
      .c-blue   rect { fill: #042C53; stroke: #85B7EB; } .c-blue   .th,.c-blue   .t { fill: #B5D4F4; } .c-blue   .ts { fill: #85B7EB; }
      .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple .th,.c-purple .t { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
      .c-gray   rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray   .th,.c-gray   .t { fill: #D3D1C7; } .c-gray   .ts { fill: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
<text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">Intelligence pipeline</text>
<text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">How the Smart Agricultural Workcell perceives, decides, and acts</text>

<g class="c-teal"><rect x="20" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="64" y="90" text-anchor="middle" dominant-baseline="central">Sense</text>
  <text class="ts" x="64" y="112" text-anchor="middle" dominant-baseline="central">Module 09</text></g>
<line x1="108" y1="97" x2="120" y2="97" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>

<g class="c-teal"><rect x="120" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="164" y="90" text-anchor="middle" dominant-baseline="central">Understand</text>
  <text class="ts" x="164" y="112" text-anchor="middle" dominant-baseline="central">Modules 09–10</text></g>
<line x1="208" y1="97" x2="220" y2="97" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>

<g class="c-blue"><rect x="220" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="264" y="90" text-anchor="middle" dominant-baseline="central">Decide</text>
  <text class="ts" x="264" y="112" text-anchor="middle" dominant-baseline="central">Module 10</text></g>
<line x1="308" y1="97" x2="320" y2="97" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>

<g class="c-blue"><rect x="320" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="364" y="90" text-anchor="middle" dominant-baseline="central">Command</text>
  <text class="ts" x="364" y="112" text-anchor="middle" dominant-baseline="central">Module 10</text></g>
<line x1="408" y1="97" x2="420" y2="97" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>

<g class="c-coral"><rect x="420" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="464" y="90" text-anchor="middle" dominant-baseline="central">Actuate</text>
  <text class="ts" x="464" y="112" text-anchor="middle" dominant-baseline="central">Modules 05–08</text></g>
<line x1="508" y1="97" x2="520" y2="97" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>

<g class="c-purple"><rect x="520" y="62" width="88" height="70" rx="6"/>
  <text class="th" x="564" y="90" text-anchor="middle" dominant-baseline="central">Validate</text>
  <text class="ts" x="564" y="112" text-anchor="middle" dominant-baseline="central">Modules 11–12</text></g>

<path d="M564 132 L564 152 L64 152 L64 134" fill="none" stroke="#9c9a92" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts dim" x="314" y="168" text-anchor="middle" dominant-baseline="central">Continuous feedback loop</text>

<line x1="20" y1="182" x2="660" y2="182" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>
<line x1="20" y1="238" x2="660" y2="238" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>
<line x1="20" y1="294" x2="660" y2="294" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>
<line x1="20" y1="350" x2="660" y2="350" stroke="#B4B2A9" stroke-width="0.5" opacity="0.3"/>

<text class="ts dim" x="340" y="196" text-anchor="middle" dominant-baseline="central">Physical components</text>
<text class="ts" x="64"  y="216" text-anchor="middle" dominant-baseline="central">Pressure sensor</text>
<text class="ts" x="164" y="210" text-anchor="middle" dominant-baseline="central">Signal filter</text>
<text class="ts" x="164" y="228" text-anchor="middle" dominant-baseline="central">State estimator</text>
<text class="ts" x="264" y="216" text-anchor="middle" dominant-baseline="central">PID controller</text>
<text class="ts" x="364" y="210" text-anchor="middle" dominant-baseline="central">Arduino Mega</text>
<text class="ts" x="364" y="228" text-anchor="middle" dominant-baseline="central">Raspberry Pi 4</text>
<text class="ts" x="464" y="210" text-anchor="middle" dominant-baseline="central">Solenoid DCV</text>
<text class="ts" x="464" y="228" text-anchor="middle" dominant-baseline="central">Cylinder</text>
<text class="ts" x="564" y="210" text-anchor="middle" dominant-baseline="central">Digital twin</text>
<text class="ts" x="564" y="228" text-anchor="middle" dominant-baseline="central">Residuals</text>

<text class="ts dim" x="340" y="252" text-anchor="middle" dominant-baseline="central">Additional sensors</text>
<text class="ts" x="64"  y="268" text-anchor="middle" dominant-baseline="central">Position sensor</text>
<text class="ts" x="64"  y="284" text-anchor="middle" dominant-baseline="central">Flow sensor</text>
<text class="ts" x="164" y="272" text-anchor="middle" dominant-baseline="central">Moving-avg filter</text>
<text class="ts" x="264" y="272" text-anchor="middle" dominant-baseline="central">State machine</text>
<text class="ts" x="364" y="272" text-anchor="middle" dominant-baseline="central">PWM output</text>
<text class="ts" x="464" y="272" text-anchor="middle" dominant-baseline="central">End effector</text>
<text class="ts" x="564" y="272" text-anchor="middle" dominant-baseline="central">Fault detector</text>

<text class="ts dim" x="340" y="308" text-anchor="middle" dominant-baseline="central">Code files</text>
<text class="ts" x="64"  y="326" text-anchor="middle" dominant-baseline="central">sensor_reader</text>
<text class="ts" x="164" y="326" text-anchor="middle" dominant-baseline="central">sensor_viz</text>
<text class="ts" x="264" y="326" text-anchor="middle" dominant-baseline="central">position_ctrl</text>
<text class="ts" x="364" y="326" text-anchor="middle" dominant-baseline="central">task_seq</text>
<text class="ts" x="464" y="326" text-anchor="middle" dominant-baseline="central">valve_model</text>
<text class="ts" x="564" y="326" text-anchor="middle" dominant-baseline="central">workcell_twin</text>

<text class="ts dim" x="340" y="366" text-anchor="middle" dominant-baseline="central">Debugging: trace left to right — start at Sense, work toward Validate to isolate faults</text>

<g class="c-teal"><rect x="60"  y="392" width="12" height="12" rx="2"/></g>
<text class="ts" x="78"  y="398" dominant-baseline="central">Sensing</text>
<g class="c-blue"><rect x="148" y="392" width="12" height="12" rx="2"/></g>
<text class="ts" x="166" y="398" dominant-baseline="central">Decision</text>
<g class="c-coral"><rect x="240" y="392" width="12" height="12" rx="2"/></g>
<text class="ts" x="258" y="398" dominant-baseline="central">Actuation</text>
<g class="c-purple"><rect x="330" y="392" width="12" height="12" rx="2"/></g>
<text class="ts" x="348" y="398" dominant-baseline="central">Validation</text>
</svg>
