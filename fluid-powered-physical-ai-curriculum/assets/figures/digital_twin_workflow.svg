<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" role="img" font-family="sans-serif">
<title>Digital twin workflow — physical system and software model in parallel</title>
<desc>Two columns: the physical Smart Agricultural Workcell with six hardware layers, and the digital twin software model with six matching layers. Sensor data flows physical to twin; fault flags return. The twin is built incrementally across modules.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .arr { stroke: #73726c; stroke-width: 1.5px; fill: none; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }
    rect { stroke-width: 0.5px; }
    .c-amber  rect { fill: #FAEEDA; stroke: #BA7517; } .c-amber  .th,.c-amber  .t { fill: #633806; } .c-amber  .ts { fill: #854F0B; }
    .c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  .th,.c-coral  .t { fill: #712B13; } .c-coral  .ts { fill: #993C1D; }
    .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   .th,.c-teal   .t { fill: #085041; } .c-teal   .ts { fill: #0F6E56; }
    .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue   .th,.c-blue   .t { fill: #0C447C; } .c-blue   .ts { fill: #185FA5; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th,.c-purple .t { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
    .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray   .th,.c-gray   .t { fill: #444441; } .c-gray   .ts { fill: #5F5E5A; }
    .dim { opacity: 0.45; }
    @media (prefers-color-scheme: dark) {
      .t { fill: #E8E6DE; } .ts { fill: #B4B2A9; } .th { fill: #F1EFE8; }
      .arr { stroke: #9c9a92; } .leader { stroke: #5F5E5A; }
      .c-amber  rect { fill: #412402; stroke: #EF9F27; } .c-amber  .th,.c-amber  .t { fill: #FAC775; } .c-amber  .ts { fill: #EF9F27; }
      .c-coral  rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral  .th,.c-coral  .t { fill: #F5C4B3; } .c-coral  .ts { fill: #F0997B; }
      .c-teal   rect { fill: #04342C; stroke: #5DCAA5; } .c-teal   .th,.c-teal   .t { fill: #9FE1CB; } .c-teal   .ts { fill: #5DCAA5; }
      .c-blue   rect { fill: #042C53; stroke: #85B7EB; } .c-blue   .th,.c-blue   .t { fill: #B5D4F4; } .c-blue   .ts { fill: #85B7EB; }
      .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple .th,.c-purple .t { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
      .c-gray   rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray   .th,.c-gray   .t { fill: #D3D1C7; } .c-gray   .ts { fill: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
<text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">Digital twin workflow</text>
<text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">Physical system and software model running side-by-side</text>

<g class="c-amber"><rect x="16" y="56" width="272" height="28" rx="5"/>
  <text class="th" x="152" y="70" text-anchor="middle" dominant-baseline="central">Physical system</text></g>
<g class="c-purple"><rect x="392" y="56" width="272" height="28" rx="5"/>
  <text class="th" x="528" y="70" text-anchor="middle" dominant-baseline="central">Digital twin model</text></g>
<text class="ts dim" x="340" y="70" text-anchor="middle" dominant-baseline="central">data</text>

<g class="c-amber"><rect x="16" y="92" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="111" text-anchor="middle" dominant-baseline="central">Pump + motor</text>
  <text class="ts" x="152" y="130" text-anchor="middle" dominant-baseline="central">Gear pump · 5–20 LPM · Module 05</text></g>
<g class="c-purple"><rect x="392" y="92" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="111" text-anchor="middle" dominant-baseline="central">Pump model</text>
  <text class="ts" x="528" y="130" text-anchor="middle" dominant-baseline="central">flow(speed, pressure) → Q · Module 05</text></g>

<g class="c-amber"><rect x="16" y="152" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="171" text-anchor="middle" dominant-baseline="central">Valves</text>
  <text class="ts" x="152" y="190" text-anchor="middle" dominant-baseline="central">4/3 solenoid DCV · Module 06</text></g>
<g class="c-purple"><rect x="392" y="152" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="171" text-anchor="middle" dominant-baseline="central">Valve orifice model</text>
  <text class="ts" x="528" y="190" text-anchor="middle" dominant-baseline="central">Q = Cd · A · √(2ΔP/ρ) · Module 06</text></g>

<g class="c-coral"><rect x="16" y="212" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="231" text-anchor="middle" dominant-baseline="central">Cylinder</text>
  <text class="ts" x="152" y="250" text-anchor="middle" dominant-baseline="central">Primary actuator · Module 07</text></g>
<g class="c-purple"><rect x="392" y="212" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="231" text-anchor="middle" dominant-baseline="central">Cylinder ODE</text>
  <text class="ts" x="528" y="250" text-anchor="middle" dominant-baseline="central">Force balance + friction · Module 04, 07</text></g>

<g class="c-teal"><rect x="16" y="272" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="291" text-anchor="middle" dominant-baseline="central">Sensors</text>
  <text class="ts" x="152" y="310" text-anchor="middle" dominant-baseline="central">Pressure · position · flow · Module 09</text></g>
<g class="c-purple"><rect x="392" y="272" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="291" text-anchor="middle" dominant-baseline="central">Sensor noise model</text>
  <text class="ts" x="528" y="310" text-anchor="middle" dominant-baseline="central">Gaussian noise + calibration · Module 09</text></g>

<g class="c-teal"><rect x="16" y="332" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="351" text-anchor="middle" dominant-baseline="central">Embedded controller</text>
  <text class="ts" x="152" y="370" text-anchor="middle" dominant-baseline="central">Arduino + Raspberry Pi · Module 10</text></g>
<g class="c-purple"><rect x="392" y="332" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="351" text-anchor="middle" dominant-baseline="central">Control simulation</text>
  <text class="ts" x="528" y="370" text-anchor="middle" dominant-baseline="central">PID in the loop · closed_loop_sim.ipynb</text></g>

<g class="c-gray"><rect x="16" y="392" width="272" height="50" rx="5"/>
  <text class="th" x="152" y="411" text-anchor="middle" dominant-baseline="central">Logged data</text>
  <text class="ts" x="152" y="430" text-anchor="middle" dominant-baseline="central">CSV via Raspberry Pi · 50 Hz</text></g>
<g class="c-purple"><rect x="392" y="392" width="272" height="50" rx="5"/>
  <text class="th" x="528" y="411" text-anchor="middle" dominant-baseline="central">Residuals + dashboard</text>
  <text class="ts" x="528" y="430" text-anchor="middle" dominant-baseline="central">ε = measured − predicted · Module 11</text></g>

<line x1="288" y1="297" x2="390" y2="297" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>
<text class="ts" x="340" y="286" text-anchor="middle" dominant-baseline="central">sensor data</text>
<line x1="392" y1="417" x2="290" y2="417" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>
<text class="ts" x="340" y="432" text-anchor="middle" dominant-baseline="central">fault flags</text>

<line x1="288" y1="117" x2="390" y2="117" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="288" y1="177" x2="390" y2="177" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="288" y1="237" x2="390" y2="237" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>
<line x1="288" y1="357" x2="390" y2="357" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

<rect x="16" y="456" width="648" height="24" rx="4" fill="none" stroke="#B4B2A9" stroke-width="0.5" opacity="0.4"/>
<text class="ts" x="28" y="468" dominant-baseline="central">Built across:</text>
<g class="c-gray"><rect x="108" y="460" width="34" height="16" rx="3"/><text class="ts" x="125" y="468" text-anchor="middle" dominant-baseline="central">M04</text></g>
<g class="c-amber"><rect x="148" y="460" width="34" height="16" rx="3"/><text class="ts" x="165" y="468" text-anchor="middle" dominant-baseline="central">M05</text></g>
<g class="c-amber"><rect x="188" y="460" width="34" height="16" rx="3"/><text class="ts" x="205" y="468" text-anchor="middle" dominant-baseline="central">M06</text></g>
<g class="c-amber"><rect x="228" y="460" width="34" height="16" rx="3"/><text class="ts" x="245" y="468" text-anchor="middle" dominant-baseline="central">M07</text></g>
<g class="c-teal"><rect x="268" y="460" width="34" height="16" rx="3"/><text class="ts" x="285" y="468" text-anchor="middle" dominant-baseline="central">M09</text></g>
<g class="c-teal"><rect x="308" y="460" width="34" height="16" rx="3"/><text class="ts" x="325" y="468" text-anchor="middle" dominant-baseline="central">M10</text></g>
<text class="ts" x="354" y="468" dominant-baseline="central">→</text>
<g class="c-purple"><rect x="366" y="460" width="86" height="16" rx="3"/><text class="ts" x="409" y="468" text-anchor="middle" dominant-baseline="central">M11 integrate</text></g>
<text class="ts" x="458" y="468" dominant-baseline="central">→</text>
<g class="c-coral"><rect x="470" y="460" width="98" height="16" rx="3"/><text class="ts" x="519" y="468" text-anchor="middle" dominant-baseline="central">M12 demonstrate</text></g>

<text class="ts dim" x="340" y="498" text-anchor="middle" dominant-baseline="central">The twin is not started in M11 — it is already mostly built by then</text>
<text class="ts dim" x="340" y="516" text-anchor="middle" dominant-baseline="central">Python · NumPy · SciPy · Matplotlib · Jupyter · scipy.integrate.solve_ivp</text>
</svg>
