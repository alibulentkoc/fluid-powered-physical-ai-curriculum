<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 520" role="img" font-family="sans-serif">
<title>Fluid-Powered Physical AI — curriculum roadmap</title>
<desc>Twelve modules in three phases leading to the Smart Agricultural Workcell capstone: Foundations, Hydraulic engineering, Intelligence and digital twin.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; fill: #2C2C2A; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .arr { stroke: #73726c; stroke-width: 1.5px; fill: none; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }
    rect { stroke-width: 0.5px; }
    .c-amber  rect { fill: #FAEEDA; stroke: #BA7517; } .c-amber  .th,.c-amber  .t { fill: #633806; } .c-amber  .ts { fill: #854F0B; }
    .c-coral  rect { fill: #FAECE7; stroke: #993C1D; } .c-coral  .th,.c-coral  .t { fill: #712B13; } .c-coral  .ts { fill: #993C1D; }
    .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal   .th,.c-teal   .t { fill: #085041; } .c-teal   .ts { fill: #0F6E56; }
    .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue   .th,.c-blue   .t { fill: #0C447C; } .c-blue   .ts { fill: #185FA5; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th,.c-purple .t { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
    .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray   .th,.c-gray   .t { fill: #444441; } .c-gray   .ts { fill: #5F5E5A; }
    .dim { opacity: 0.45; }
    @media (prefers-color-scheme: dark) {
      .t { fill: #E8E6DE; } .ts { fill: #B4B2A9; } .th { fill: #F1EFE8; }
      .arr { stroke: #9c9a92; } .leader { stroke: #5F5E5A; }
      .c-amber  rect { fill: #412402; stroke: #EF9F27; } .c-amber  .th,.c-amber  .t { fill: #FAC775; } .c-amber  .ts { fill: #EF9F27; }
      .c-coral  rect { fill: #4A1B0C; stroke: #F0997B; } .c-coral  .th,.c-coral  .t { fill: #F5C4B3; } .c-coral  .ts { fill: #F0997B; }
      .c-teal   rect { fill: #04342C; stroke: #5DCAA5; } .c-teal   .th,.c-teal   .t { fill: #9FE1CB; } .c-teal   .ts { fill: #5DCAA5; }
      .c-blue   rect { fill: #042C53; stroke: #85B7EB; } .c-blue   .th,.c-blue   .t { fill: #B5D4F4; } .c-blue   .ts { fill: #85B7EB; }
      .c-purple rect { fill: #26215C; stroke: #AFA9EC; } .c-purple .th,.c-purple .t { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
      .c-gray   rect { fill: #2C2C2A; stroke: #B4B2A9; } .c-gray   .th,.c-gray   .t { fill: #D3D1C7; } .c-gray   .ts { fill: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
<text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">Curriculum roadmap</text>
<text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">One machine, twelve modules</text>

<text class="ts dim" x="340" y="72" text-anchor="middle" dominant-baseline="central">Phase 1 — Foundations</text>
<g class="c-gray"><rect x="24" y="82" width="146" height="80" rx="6"/>
  <text class="th" x="97" y="110" text-anchor="middle" dominant-baseline="central">M01</text>
  <text class="ts" x="97" y="132" text-anchor="middle" dominant-baseline="central">Foundations</text>
  <text class="ts" x="97" y="150" text-anchor="middle" dominant-baseline="central">of fluid-powered AI</text></g>
<g class="c-gray"><rect x="186" y="82" width="146" height="80" rx="6"/>
  <text class="th" x="259" y="110" text-anchor="middle" dominant-baseline="central">M02</text>
  <text class="ts" x="259" y="132" text-anchor="middle" dominant-baseline="central">Hydraulic</text>
  <text class="ts" x="259" y="150" text-anchor="middle" dominant-baseline="central">components</text></g>
<g class="c-gray"><rect x="348" y="82" width="146" height="80" rx="6"/>
  <text class="th" x="421" y="110" text-anchor="middle" dominant-baseline="central">M03</text>
  <text class="ts" x="421" y="132" text-anchor="middle" dominant-baseline="central">Hydraulic fluids</text>
  <text class="ts" x="421" y="150" text-anchor="middle" dominant-baseline="central">&amp; transmission</text></g>
<g class="c-gray"><rect x="510" y="82" width="146" height="80" rx="6"/>
  <text class="th" x="583" y="110" text-anchor="middle" dominant-baseline="central">M04</text>
  <text class="ts" x="583" y="132" text-anchor="middle" dominant-baseline="central">Fluid mechanics</text>
  <text class="ts" x="583" y="150" text-anchor="middle" dominant-baseline="central">+ first ODE model</text></g>
<line x1="170" y1="122" x2="184" y2="122" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
<line x1="332" y1="122" x2="346" y2="122" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
<line x1="494" y1="122" x2="508" y2="122" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>

<line x1="20" y1="174" x2="660" y2="174" stroke="#B4B2A9" stroke-width="0.5" opacity="0.25"/>
<text class="ts dim" x="340" y="186" text-anchor="middle" dominant-baseline="central">Phase 2 — Hydraulic engineering</text>
<g class="c-amber"><rect x="24" y="196" width="146" height="80" rx="6"/>
  <text class="th" x="97" y="224" text-anchor="middle" dominant-baseline="central">M05</text>
  <text class="ts" x="97" y="246" text-anchor="middle" dominant-baseline="central">Pumps &amp; power</text>
  <text class="ts" x="97" y="264" text-anchor="middle" dominant-baseline="central">generation</text></g>
<g class="c-amber"><rect x="186" y="196" width="146" height="80" rx="6"/>
  <text class="th" x="259" y="224" text-anchor="middle" dominant-baseline="central">M06</text>
  <text class="ts" x="259" y="246" text-anchor="middle" dominant-baseline="central">Valves &amp; motion</text>
  <text class="ts" x="259" y="264" text-anchor="middle" dominant-baseline="central">control</text></g>
<g class="c-amber"><rect x="348" y="196" width="146" height="80" rx="6"/>
  <text class="th" x="421" y="224" text-anchor="middle" dominant-baseline="central">M07</text>
  <text class="ts" x="421" y="246" text-anchor="middle" dominant-baseline="central">Cylinders</text>
  <text class="ts" x="421" y="264" text-anchor="middle" dominant-baseline="central">&amp; motors</text></g>
<g class="c-amber"><rect x="510" y="196" width="146" height="80" rx="6"/>
  <text class="th" x="583" y="224" text-anchor="middle" dominant-baseline="central">M08</text>
  <text class="ts" x="583" y="246" text-anchor="middle" dominant-baseline="central">Circuit design</text>
  <text class="ts" x="583" y="264" text-anchor="middle" dominant-baseline="central">&amp; integration</text></g>
<line x1="170" y1="236" x2="184" y2="236" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<line x1="332" y1="236" x2="346" y2="236" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>
<line x1="494" y1="236" x2="508" y2="236" class="arr" marker-end="url(#arrow)" stroke="#BA7517"/>

<line x1="20" y1="288" x2="660" y2="288" stroke="#B4B2A9" stroke-width="0.5" opacity="0.25"/>
<text class="ts dim" x="340" y="300" text-anchor="middle" dominant-baseline="central">Phase 3 — Intelligence &amp; digital twin</text>
<g class="c-teal"><rect x="106" y="310" width="146" height="80" rx="6"/>
  <text class="th" x="179" y="338" text-anchor="middle" dominant-baseline="central">M09</text>
  <text class="ts" x="179" y="360" text-anchor="middle" dominant-baseline="central">Sensors &amp;</text>
  <text class="ts" x="179" y="378" text-anchor="middle" dominant-baseline="central">instrumentation</text></g>
<g class="c-teal"><rect x="267" y="310" width="146" height="80" rx="6"/>
  <text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central">M10</text>
  <text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">Embedded control</text>
  <text class="ts" x="340" y="378" text-anchor="middle" dominant-baseline="central">PID + sequencing</text></g>
<g class="c-purple"><rect x="428" y="310" width="146" height="80" rx="6"/>
  <text class="th" x="501" y="338" text-anchor="middle" dominant-baseline="central">M11</text>
  <text class="ts" x="501" y="360" text-anchor="middle" dominant-baseline="central">Digital twin</text>
  <text class="ts" x="501" y="378" text-anchor="middle" dominant-baseline="central">integration</text></g>
<line x1="252" y1="350" x2="265" y2="350" class="arr" marker-end="url(#arrow)" stroke="#0F6E56"/>
<line x1="413" y1="350" x2="426" y2="350" class="arr" marker-end="url(#arrow)" stroke="#534AB7"/>

<line x1="97"  y1="276" x2="97"  y2="410" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>
<line x1="583" y1="276" x2="583" y2="410" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>
<line x1="179" y1="390" x2="179" y2="410" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>
<line x1="501" y1="390" x2="501" y2="410" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>
<line x1="340" y1="390" x2="340" y2="410" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>

<g class="c-coral"><rect x="20" y="412" width="640" height="64" rx="8"/>
  <text class="th" x="340" y="434" text-anchor="middle" dominant-baseline="central">M12 · Smart Agricultural Workcell capstone</text>
  <text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central">Six subsystems integrated · two autonomous tasks · digital twin validated · Modules 01–11 converge</text></g>

<g class="c-gray"><rect x="68"  y="494" width="12" height="12" rx="2"/></g>
<text class="ts" x="86"  y="500" dominant-baseline="central">Foundations</text>
<g class="c-amber"><rect x="196" y="494" width="12" height="12" rx="2"/></g>
<text class="ts" x="214" y="500" dominant-baseline="central">Hydraulic engineering</text>
<g class="c-teal"><rect x="360" y="494" width="12" height="12" rx="2"/></g>
<text class="ts" x="378" y="500" dominant-baseline="central">Intelligence</text>
<g class="c-purple"><rect x="464" y="494" width="12" height="12" rx="2"/></g>
<text class="ts" x="482" y="500" dominant-baseline="central">Digital twin</text>
<g class="c-coral"><rect x="558" y="494" width="12" height="12" rx="2"/></g>
<text class="ts" x="576" y="500" dominant-baseline="central">Capstone</text>
</svg>
