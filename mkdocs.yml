  - "Module 01 — Foundations":
      - "Why this matters": modules/module01_foundations/lessons/01_why_this_matters.md
      - "Physical intuition": modules/module01_foundations/lessons/02_physical_intuition.md
      - "Mathematical foundations": modules/module01_foundations/lessons/03_mathematical_foundations.md
