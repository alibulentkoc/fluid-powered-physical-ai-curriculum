site_name: Fluid-Powered Physical AI Curriculum
site_description: >-
  An open curriculum in fluid power, hydraulics, electro-hydraulic systems,
  sensors, embedded intelligence, agricultural robotics, and digital twins —
  built around one running machine, the Smart Agricultural Workcell.
site_url: https://alibulentkoc.github.io/fluid-powered-physical-ai-curriculum/
repo_url: https://github.com/alibulentkoc/fluid-powered-physical-ai-curriculum
repo_name: alibulentkoc/fluid-powered-physical-ai-curriculum
edit_uri: edit/main/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alibulentkoc/fluid-powered-physical-ai-curriculum

