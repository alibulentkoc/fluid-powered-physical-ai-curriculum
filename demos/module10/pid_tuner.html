<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PID Tuner</title><style>
:root{--fp-blue:#185FA5;--fp-blue-dark:#0d3d6e;--fp-green:#2e9e5b;--fp-red:#d4504e;--fp-amber:#e0a030;--fp-bg:#fff;--fp-panel:#f6f8fa;--fp-border:#d9e1e8;--fp-text:#1a2733;--fp-muted:#5a6b7b}
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--fp-text);background:var(--fp-bg);margin:0;padding:24px;line-height:1.55}
.fp-wrap{max-width:820px;margin:0 auto}
.fp-header{border-bottom:3px solid var(--fp-blue);padding-bottom:12px;margin-bottom:20px}
.fp-header h1{font-size:1.45rem;margin:0 0 4px;color:var(--fp-blue-dark)}
.fp-header .fp-sub{color:var(--fp-muted);font-size:.92rem}
.fp-panel{background:var(--fp-panel);border:1px solid var(--fp-border);border-radius:10px;padding:20px;margin-bottom:18px}
.fp-control{margin-bottom:16px}.fp-control label{display:block;font-weight:600;font-size:.9rem;margin-bottom:6px}
.fp-control .fp-val{color:var(--fp-blue);font-weight:700}
input[type=range]{width:100%;accent-color:var(--fp-blue)}
select,input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--fp-border);border-radius:6px;font-size:.95rem;background:#fff}
.fp-out{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:8px}
.fp-metric{background:#fff;border:1px solid var(--fp-border);border-radius:8px;padding:12px 14px;text-align:center}
.fp-metric .fp-num{font-size:1.4rem;font-weight:700;color:var(--fp-blue)}
.fp-metric .fp-label{font-size:.78rem;color:var(--fp-muted);margin-top:2px}
.fp-metric.pass .fp-num{color:var(--fp-green)}.fp-metric.fail .fp-num{color:var(--fp-red)}
.fp-btn{background:var(--fp-blue);color:#fff;border:none;border-radius:7px;padding:10px 18px;font-weight:600;cursor:pointer}
.fp-btn:hover{background:var(--fp-blue-dark)}.fp-btn.secondary{background:#fff;color:var(--fp-blue);border:1.5px solid var(--fp-blue)}
canvas{max-width:100%;background:#fff;border-radius:8px;border:1px solid var(--fp-border);margin-top:8px}
.fp-note{font-size:.85rem;color:var(--fp-muted);margin-top:10px}
h2{font-size:1.05rem;color:var(--fp-blue-dark);margin:0 0 14px}
code{background:#eef2f5;padding:1px 5px;border-radius:4px;font-size:.88em}
</style></head>
<body><div class="fp-wrap">
<div class="fp-header"><h1>PID Tuner</h1><div class="fp-sub">Module 10 — give the machine a precise controller</div></div>
<div class="fp-panel"><h2>Tune the position loop</h2>
 <div class="fp-control"><label>Kp: <span class="fp-val" id="kpV">2.0</span></label><input type="range" id="kp" min="0" max="6" value="2" step="0.1"></div>
 <div class="fp-control"><label>Ki: <span class="fp-val" id="kiV">0.5</span></label><input type="range" id="ki" min="0" max="3" value="0.5" step="0.1"></div>
 <div class="fp-control"><label>Kd: <span class="fp-val" id="kdV">0.2</span></label><input type="range" id="kd" min="0" max="2" value="0.2" step="0.05"></div>
 <div class="fp-out">
 <div class="fp-metric" id="osB"><div class="fp-num" id="os">—</div><div class="fp-label">overshoot (%)</div></div>
 <div class="fp-metric" id="ssB"><div class="fp-num" id="ss">—</div><div class="fp-label">steady-state err (mm)</div></div></div>
 <canvas id="cv" width="760" height="240"></canvas>
 <div class="fp-note">Step response of a velocity-mode position servo to a 200 mm command. Specs: overshoot &lt;5%, steady-state error &lt;2 mm. Watch how the gains trade speed vs overshoot.</div></div>
</div><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
 function sim(){const kp=+document.getElementById('kp').value,ki=+document.getElementById('ki').value,kd=+document.getElementById('kd').value;
 document.getElementById('kpV').textContent=kp.toFixed(1);document.getElementById('kiV').textContent=ki.toFixed(1);document.getElementById('kdV').textContent=kd.toFixed(2);
 const tgt=200,dt=0.01,vmax=132;let pos=0,integ=0,prev=0,peak=0,hist=[];
 for(let k=0;k<400;k++){const e=tgt-pos;integ+=e*dt;const der=(e-prev)/dt;prev=e;
 let v=kp*e+ki*integ+kd*der;v=Math.max(-vmax,Math.min(vmax,v));pos+=v*dt;pos=Math.max(0,Math.min(300,pos));peak=Math.max(peak,pos);hist.push(pos);}
 const os=Math.max(0,(peak-tgt)/tgt*100),ss=Math.abs(tgt-pos);
 document.getElementById('os').textContent=os.toFixed(1);document.getElementById('ss').textContent=ss.toFixed(2);
 document.getElementById('osB').className='fp-metric '+(os<5?'pass':'fail');
 document.getElementById('ssB').className='fp-metric '+(ss<2?'pass':'fail');
 ctx.clearRect(0,0,cv.width,cv.height);ctx.strokeStyle='#e0a030';ctx.setLineDash([5,4]);ctx.beginPath();
 const yT=220-(tgt/300)*200;ctx.moveTo(20,yT);ctx.lineTo(750,yT);ctx.stroke();ctx.setLineDash([]);
 ctx.strokeStyle='#185FA5';ctx.lineWidth=2;ctx.beginPath();hist.forEach((p,k)=>{const X=20+k*1.82,Y=220-(p/300)*200;k?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});ctx.stroke();
 ctx.fillStyle='#5a6b7b';ctx.font='11px sans-serif';ctx.fillText('target 200 mm (amber), response (blue)',24,16);}
 ['kp','ki','kd'].forEach(i=>document.getElementById(i).addEventListener('input',sim));sim();</script></body></html>
