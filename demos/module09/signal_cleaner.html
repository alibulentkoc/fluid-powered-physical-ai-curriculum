<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sensor Signal Cleaner</title><style>
:root{--fp-blue:#185FA5;--fp-blue-dark:#0d3d6e;--fp-green:#2e9e5b;--fp-red:#d4504e;--fp-amber:#e0a030;--fp-bg:#fff;--fp-panel:#f6f8fa;--fp-border:#d9e1e8;--fp-text:#1a2733;--fp-muted:#5a6b7b}
*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--fp-text);background:var(--fp-bg);margin:0;padding:24px;line-height:1.55}
.fp-wrap{max-width:820px;margin:0 auto}
.fp-header{border-bottom:3px solid var(--fp-blue);padding-bottom:12px;margin-bottom:20px}
.fp-header h1{font-size:1.45rem;margin:0 0 4px;color:var(--fp-blue-dark)}
.fp-header .fp-sub{color:var(--fp-muted);font-size:.92rem}
.fp-panel{background:var(--fp-panel);border:1px solid var(--fp-border);border-radius:10px;padding:20px;margin-bottom:18px}
.fp-control{margin-bottom:16px}.fp-control label{display:block;font-weight:600;font-size:.9rem;margin-bottom:6px}
.fp-control .fp-val{color:var(--fp-blue);font-weight:700}
input[type=range]{width:100%;accent-color:var(--fp-blue)}
select,input[type=number]{width:100%;padding:8px 10px;border:1px solid var(--fp-border);border-radius:6px;font-size:.95rem;background:#fff}
.fp-out{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:8px}
.fp-metric{background:#fff;border:1px solid var(--fp-border);border-radius:8px;padding:12px 14px;text-align:center}
.fp-metric .fp-num{font-size:1.4rem;font-weight:700;color:var(--fp-blue)}
.fp-metric .fp-label{font-size:.78rem;color:var(--fp-muted);margin-top:2px}
.fp-metric.pass .fp-num{color:var(--fp-green)}.fp-metric.fail .fp-num{color:var(--fp-red)}
.fp-btn{background:var(--fp-blue);color:#fff;border:none;border-radius:7px;padding:10px 18px;font-weight:600;cursor:pointer}
.fp-btn:hover{background:var(--fp-blue-dark)}.fp-btn.secondary{background:#fff;color:var(--fp-blue);border:1.5px solid var(--fp-blue)}
canvas{max-width:100%;background:#fff;border-radius:8px;border:1px solid var(--fp-border);margin-top:8px}
.fp-note{font-size:.85rem;color:var(--fp-muted);margin-top:10px}
h2{font-size:1.05rem;color:var(--fp-blue-dark);margin:0 0 14px}
code{background:#eef2f5;padding:1px 5px;border-radius:4px;font-size:.88em}
</style></head>
<body><div class="fp-wrap">
<div class="fp-header"><h1>Sensor Signal Cleaner</h1><div class="fp-sub">Module 09 — cleaning the machine's senses</div></div>
<div class="fp-panel"><h2>Filter the noisy sensor</h2>
 <div class="fp-control"><label>Noise level: <span class="fp-val" id="nV">0.3</span></label><input type="range" id="n" min="0" max="1" value="0.3" step="0.05"></div>
 <div class="fp-control"><label>Filter strength (smoothing α): <span class="fp-val" id="aV">0.2</span></label><input type="range" id="a" min="0.02" max="1" value="0.2" step="0.02"></div>
 <canvas id="cv" width="760" height="240"></canvas>
 <div class="fp-note">A noisy pressure/position signal (grey) cleaned by an exponential moving-average filter (blue): y[k]=α·x[k]+(1−α)·y[k−1]. Lower α = smoother but slower to respond.</div></div>
</div><script>const cv=document.getElementById('cv'),ctx=cv.getContext('2d');let seed=1;
 function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
 function draw(){const n=+document.getElementById('n').value,a=+document.getElementById('a').value;
 document.getElementById('nV').textContent=n.toFixed(2);document.getElementById('aV').textContent=a.toFixed(2);
 seed=1;ctx.clearRect(0,0,cv.width,cv.height);
 const N=150,raw=[],fil=[];let y=0.5;
 for(let k=0;k<N;k++){const clean=0.5+0.3*Math.sin(k/12);const x=clean+(rnd()-0.5)*n;raw.push(x);y=a*x+(1-a)*y;fil.push(y);}
 function plot(arr,col,w){ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();arr.forEach((v,k)=>{const X=20+k*4.9,Y=220-v*200;k?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});ctx.stroke();}
 plot(raw,'#c2ccd6',1);plot(fil,'#185FA5',2.2);
 ctx.fillStyle='#5a6b7b';ctx.font='11px sans-serif';ctx.fillText('grey = raw, blue = filtered',20,16);}
 ['n','a'].forEach(i=>document.getElementById(i).addEventListener('input',draw));draw();</script></body></html>
